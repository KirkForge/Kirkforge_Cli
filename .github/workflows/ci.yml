name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Fast-fail formatting check. Required before the expensive quality
  # job so we never burn CI minutes on unformatted code.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

  quality:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --locked --workspace

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --release --locked

  integration:
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Ollama and pull test model
        timeout-minutes: 10
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:11434/api/tags >/dev/null
          curl -fsS -X POST http://localhost:11434/api/pull \
            -d '{"model": "qwen2.5:0.5b", "stream": false}'

      - name: Run integration tests
        run: cargo test --test integration_test -- --include-ignored --nocapture

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        # Prebuilt binary avoids pulling in cargo-platform 0.3.3, whose
        # MSRV is now Rust 1.91 while the repo pins 1.88.0.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --locked --workspace

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit || true

  # Surface the health of the GitNexus code-intelligence index in every
  # build log. This does not fail CI (the index is optional), but it
  # makes it obvious when impact analysis is unavailable.
  gitnexus-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check GitNexus index health
        run: |
          if [ -f .gitnexus/run.cjs ]; then
            node .gitnexus/run.cjs status || true
          else
            echo "GitNexus runner not present; index unavailable"
          fi
