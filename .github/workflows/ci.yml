# Fast CI — lint + test on the native x86_64-unknown-linux-gnu target.
# Runs on every push/PR before the slower cross-compile matrix.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release, gnu)
        run: cargo build --release
      - name: Smoke test — print help
        run: target/release/kirkforge --help