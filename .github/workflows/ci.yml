name: CI

on:
  push:
    branches: [main, dev, merge, "phase/**"]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  # Fast-fail formatting check. Required before the expensive quality
  # job so we never burn CI minutes on unformatted code.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce changelog entry or label
        run: |
          # Every behavior-changing PR must either add a changelog: label or
          # add a line referencing the PR number to CHANGELOG.md.
          labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q '"changelog:'; then
            echo "Found changelog: label; skipping CHANGELOG.md check."
            exit 0
          fi
          pr_num='${{ github.event.pull_request.number }}'
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'CHANGELOG.md'; then
            if git diff origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md | grep -E "^\+.*#${pr_num}($|[^0-9])" >/dev/null; then
              echo "CHANGELOG.md contains PR #${pr_num} entry."
              exit 0
            fi
          fi
          echo "Missing changelog entry or changelog: label."
          echo "Add a line under ## [Unreleased] in CHANGELOG.md that references #${pr_num},"
          echo "or add a changelog: label to the PR."
          exit 1

  quality:
    runs-on: ubuntu-latest
    needs: [fmt, changelog]
    # Changelog check is only defined for pull requests; on push the job's
    # dependency is treated as satisfied because the push workflow has no PR.
    if: always() && (needs.changelog.result == 'success' || needs.changelog.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        # Nextest gives 2-3x speedup via better parallelism and per-test
        # isolation. Falls back to `cargo test` below if the install fails.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install video test dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg flite

      - name: Run tests (fast suite on PR, full suite on push)
        # Partition the suite per ADR-0029: PRs run the lib-only fast suite
        # (~45s) so feedback is fast; pushes to main/dev/merge/phase/** run
        # the full workspace suite to catch integration regressions.
        # `--locked` keeps the lockfile in sync with the original command.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cargo nextest run --locked --lib --no-fail-fast --workspace || cargo test --locked --lib --no-fail-fast
          else
            cargo nextest run --locked --workspace --no-fail-fast || cargo test --locked --workspace --no-fail-fast
          fi

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --release --locked

  windows:
    runs-on: windows-latest
    needs: fmt
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Run tests on Windows
        shell: bash
        # Windows test parity is a work in progress. The build (compile +
        # clippy) is required to stay green; the test suite is allowed to fail
        # while cross-platform path/snapshot/spec-drift issues are resolved.
        run: cargo test --locked --workspace --no-fail-fast
        continue-on-error: true

      - name: Build release binary on Windows
        run: cargo build --release --locked

  integration:
    runs-on: ubuntu-latest
    env:
      TEST_MODEL: qwen2.5:0.5b
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.TEST_MODEL }}-${{ runner.os }}-${{ hashFiles('tests/integration_test.rs') }}
          restore-keys: |
            ollama-models-${{ env.TEST_MODEL }}-${{ runner.os }}-
            ollama-models-${{ env.TEST_MODEL }}-

      - name: Install and start Ollama
        shell: bash
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve >/tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:11434/api/tags >/dev/null || { echo "Ollama failed to start"; cat /tmp/ollama.log; exit 1; }

      - name: Pull test model
        shell: bash
        run: |
          if ! curl -fsS http://localhost:11434/api/tags | grep -q "${TEST_MODEL}"; then
            ollama pull "${TEST_MODEL}"
          else
            echo "Test model ${TEST_MODEL} already cached"
          fi

      - name: Run integration tests against Ollama
        run: cargo test --test integration_test -- --include-ignored

      - name: Run smoke tests
        run: cargo test --test smoke_test

  bench:
    runs-on: ubuntu-latest
    needs: [fmt, quality]
    if: always() && (needs.fmt.result == 'success' || needs.fmt.result == 'skipped')
    env:
      BENCH_MODEL: qwen2.5:0.5b
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if bench-relevant files changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            CHANGED=$(git diff --name-only "$BASE..HEAD" -- \
              'src/session/**' 'src/adapters/**' 'src/tools/**' \
              'crates/kirkforge-bench/**' 'benches/tasks/**' \
              '.github/workflows/ci.yml' || true)
          else
            CHANGED="yes"
          fi
          if [ -n "$CHANGED" ]; then
            echo "run_bench=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_bench=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.changes.outputs.run_bench == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.run_bench == 'true'

      - name: Install and start Ollama
        if: steps.changes.outputs.run_bench == 'true'
        shell: bash
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve >/tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:11434/api/tags >/dev/null || { echo "Ollama failed to start"; cat /tmp/ollama.log; exit 1; }

      - name: Pull bench model
        if: steps.changes.outputs.run_bench == 'true'
        shell: bash
        run: |
          if ! curl -fsS http://localhost:11434/api/tags | grep -q "${BENCH_MODEL}"; then
            ollama pull "${BENCH_MODEL}"
          else
            echo "Bench model ${BENCH_MODEL} already cached"
          fi

      - name: Download baseline report
        if: steps.changes.outputs.run_bench == 'true'
        continue-on-error: true
        run: |
          mkdir -p benches/baselines
          gh run download -n bench-baseline -R "${{ github.repository }}" -D benches/baselines/ || echo "No baseline found; first run will establish one"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run benchmark tasks
        if: steps.changes.outputs.run_bench == 'true'
        run: |
          cargo run -- bench run --tasks benches/tasks/ --model "${BENCH_MODEL}" --output bench-report.json --summary bench-summary.md

      - name: Compare with baseline (if available)
        if: steps.changes.outputs.run_bench == 'true'
        continue-on-error: true
        run: |
          BASELINE=$(ls benches/baselines/bench-report-*.json 2>/dev/null | head -1)
          if [ -n "$BASELINE" ] && [ -f "$BASELINE" ]; then
            cargo run -- bench compare --baseline "$BASELINE" --current bench-report.json --summary bench-delta.md || echo "Baseline comparison failed (non-fatal)"
          else
            echo "No baseline report found; skipping comparison"
          fi

      - name: Upload bench report as artifact
        if: steps.changes.outputs.run_bench == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: bench-report.json
          retention-days: 30

      - name: Post benchmark summary as PR comment
        if: github.event_name == 'pull_request' && steps.changes.outputs.run_bench == 'true'
        continue-on-error: true
        run: |
          BODY=""
          if [ -f bench-delta.md ]; then
            BODY=$(cat bench-delta.md)
          elif [ -f bench-summary.md ]; then
            BODY=$(cat bench-summary.md)
          fi
          if [ -n "$BODY" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if success rate drops below 10%
        if: steps.changes.outputs.run_bench == 'true'
        run: |
          RATE=$(python3 -c "
          import json, sys
          with open('bench-report.json') as f:
              r = json.load(f)
          print(r['summary']['success_rate'])
          ")
          echo "Benchmark success rate: ${RATE}"
          if python3 -c "import sys; sys.exit(0 if float('${RATE}') < 0.1 else 1)"; then
            echo "::warning::Benchmark success rate below 10% — possible regression"
          fi

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        # Prebuilt binary avoids pulling in cargo-platform 0.3.3, whose
        # MSRV is now Rust 1.91 while the repo pins 1.88.0.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage report
        # `--lib` instruments unit tests only, skipping the slow
        # integration tests in `tests/*` that spawn ollama/cargo
        # subprocesses. Per ADR-0029 this cuts the coverage job from
        # ~4min to ~2min. The coverage gate below already only enforces
        # thresholds on `src/session`, `src/tools`, `src/adapters` —
        # all unit-test-covered code.
        run: cargo tarpaulin --out Xml --locked --lib --timeout 120

      - name: Enforce coverage gate
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import sys
          tree = ET.parse('cobertura.xml')
          root = tree.getroot()
          packages = root.find('packages')
          targets = {'src/session': 61.0, 'src/tools': 50.0, 'src/adapters': 61.0}
          failed = False
          for prefix, threshold in targets.items():
              line_rate = 0.0
              lines_valid = 0
              lines_covered = 0
              for pkg in packages.findall('package'):
                  name = pkg.attrib.get('name', '')
                  if name == prefix or name.startswith(prefix + '/'):
                      for cls in pkg.findall('classes/class'):
                          for line in cls.findall('lines/line'):
                              lines_valid += 1
                              if int(line.attrib.get('hits', 0)) > 0:
                                  lines_covered += 1
              if lines_valid > 0:
                  line_rate = lines_covered / lines_valid * 100
              print(f'{prefix}/: {lines_covered}/{lines_valid} lines covered ({line_rate:.1f}%, threshold {threshold}%)')
              if line_rate < threshold:
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit || true

  # Build and test the vendored KirkForge-Plugin Node SDK. The local CI
  # script (scripts/ci-local.sh) already covers this; run it in CI too so
  # the plugin wrapper cannot silently break.
  node-sdk:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: npm/kirkforge-plugin/package-lock.json

      - name: Install Node SDK dependencies
        run: npm ci
        working-directory: npm/kirkforge-plugin

      - name: Run Node SDK tests
        run: npm test
        working-directory: npm/kirkforge-plugin

  # Build and test the VS Code extension. Produces a .vsix artifact on tag pushes.
  vscode:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Build and test VS Code extension
        run: npm test
        working-directory: editors/vscode

      - name: Package VS Code extension
        run: npx vsce package --no-yarn
        working-directory: editors/vscode

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirkforge-vscode-extension
          path: editors/vscode/*.vsix
