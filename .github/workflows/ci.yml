name: CI

on:
  push:
    branches: [main, dev, merge, "phase/**"]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  # Fast-fail formatting check. Required before the expensive quality
  # job so we never burn CI minutes on unformatted code.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce changelog entry or label
        run: |
          # Every behavior-changing PR must either add a changelog: label or
          # add a line referencing the PR number to CHANGELOG.md.
          labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q '"changelog:'; then
            echo "Found changelog: label; skipping CHANGELOG.md check."
            exit 0
          fi
          pr_num='${{ github.event.pull_request.number }}'
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'CHANGELOG.md'; then
            if git diff origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md | grep -E "^\+.*#${pr_num}($|[^0-9])" >/dev/null; then
              echo "CHANGELOG.md contains PR #${pr_num} entry."
              exit 0
            fi
          fi
          echo "Missing changelog entry or changelog: label."
          echo "Add a line under ## [Unreleased] in CHANGELOG.md that references #${pr_num},"
          echo "or add a changelog: label to the PR."
          exit 1

  quality:
    runs-on: ubuntu-latest
    needs: [fmt, changelog]
    # Changelog check is only defined for pull requests; on push the job's
    # dependency is treated as satisfied because the push workflow has no PR.
    if: always() && (needs.changelog.result == 'success' || needs.changelog.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install video test dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg flite

      - name: Run unit tests
        run: cargo test --locked --workspace --no-fail-fast

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --release --locked

  windows:
    runs-on: windows-latest
    needs: fmt
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Run tests on Windows
        shell: bash
        # Windows test parity is a work in progress. The build (compile +
        # clippy) is required to stay green; the test suite is allowed to fail
        # while cross-platform path/snapshot/spec-drift issues are resolved.
        run: cargo test --locked --workspace --no-fail-fast
        continue-on-error: true

      - name: Build release binary on Windows
        run: cargo build --release --locked

  integration:
    runs-on: ubuntu-latest
    env:
      TEST_MODEL: qwen2.5:0.5b
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.TEST_MODEL }}-${{ runner.os }}-${{ hashFiles('tests/integration_test.rs') }}
          restore-keys: |
            ollama-models-${{ env.TEST_MODEL }}-${{ runner.os }}-
            ollama-models-${{ env.TEST_MODEL }}-

      - name: Install and start Ollama
        shell: bash
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve >/tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:11434/api/tags >/dev/null || { echo "Ollama failed to start"; cat /tmp/ollama.log; exit 1; }

      - name: Pull test model
        shell: bash
        run: |
          if ! curl -fsS http://localhost:11434/api/tags | grep -q "${TEST_MODEL}"; then
            ollama pull "${TEST_MODEL}"
          else
            echo "Test model ${TEST_MODEL} already cached"
          fi

      - name: Run integration tests against Ollama
        run: cargo test --test integration_test -- --include-ignored

      - name: Run smoke tests
        run: cargo test --test smoke_test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        # Prebuilt binary avoids pulling in cargo-platform 0.3.3, whose
        # MSRV is now Rust 1.91 while the repo pins 1.88.0.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --locked --workspace --timeout 120

      - name: Enforce coverage gate
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import sys
          tree = ET.parse('cobertura.xml')
          root = tree.getroot()
          packages = root.find('packages')
          targets = {'src/session': 63.0, 'src/tools': 50.0, 'src/adapters': 60.0}
          failed = False
          for prefix, threshold in targets.items():
              line_rate = 0.0
              lines_valid = 0
              lines_covered = 0
              for pkg in packages.findall('package'):
                  name = pkg.attrib.get('name', '')
                  if name == prefix or name.startswith(prefix + '/'):
                      for cls in pkg.findall('classes/class'):
                          for line in cls.findall('lines/line'):
                              lines_valid += 1
                              if int(line.attrib.get('hits', 0)) > 0:
                                  lines_covered += 1
              if lines_valid > 0:
                  line_rate = lines_covered / lines_valid * 100
              print(f'{prefix}/: {lines_covered}/{lines_valid} lines covered ({line_rate:.1f}%, threshold {threshold}%)')
              if line_rate < threshold:
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit || true

  # Build and test the vendored KirkForge-Plugin Node SDK. The local CI
  # script (scripts/ci-local.sh) already covers this; run it in CI too so
  # the plugin wrapper cannot silently break.
  node-sdk:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: npm/kirkforge-plugin/package-lock.json

      - name: Install Node SDK dependencies
        run: npm ci
        working-directory: npm/kirkforge-plugin

      - name: Run Node SDK tests
        run: npm test
        working-directory: npm/kirkforge-plugin
