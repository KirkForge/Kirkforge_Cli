name: CI

on:
  push:
    branches: [main, dev, merge, "phase/**"]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  # Fast-fail formatting check. Required before the expensive quality
  # job so we never burn CI minutes on unformatted code.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  quality:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --locked --workspace

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --release --locked

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests (mock server)
        run: cargo test --test integration_test

      - name: Run smoke tests
        run: cargo test --test smoke_test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        # Prebuilt binary avoids pulling in cargo-platform 0.3.3, whose
        # MSRV is now Rust 1.91 while the repo pins 1.88.0.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --locked --workspace --timeout 120

      - name: Enforce coverage gate
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import sys
          tree = ET.parse('cobertura.xml')
          root = tree.getroot()
          packages = root.find('packages')
          targets = {'src/session': 70.0, 'src/tools': 70.0, 'src/adapters': 70.0}
          failed = False
          for prefix, threshold in targets.items():
              line_rate = 0.0
              lines_valid = 0
              lines_covered = 0
              for pkg in packages.findall('package'):
                  name = pkg.attrib.get('name', '')
                  if name == prefix or name.startswith(prefix + '/'):
                      for cls in pkg.findall('classes/class'):
                          for line in cls.findall('lines/line'):
                              lines_valid += 1
                              if int(line.attrib.get('hits', 0)) > 0:
                                  lines_covered += 1
              if lines_valid > 0:
                  line_rate = lines_covered / lines_valid * 100
              print(f'{prefix}/: {lines_covered}/{lines_valid} lines covered ({line_rate:.1f}%, threshold {threshold}%)')
              if line_rate < threshold:
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit || true

  # Surface the health of the GitNexus code-intelligence index in every
  # build log. This does not fail CI (the index is optional), but it
  # makes it obvious when impact analysis is unavailable.
  gitnexus-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check GitNexus index health
        run: |
          if [ -f .gitnexus/run.cjs ]; then
            node .gitnexus/run.cjs status || true
          else
            echo "GitNexus runner not present; index unavailable"
          fi
