# Cross-compile KirkForge CLI for all target architectures.
#
# Produces static binaries for x86_64, aarch64, and armv7 (musl).
# The x86_64-musl build runs natively on ubuntu-latest with musl-tools.
# aarch64 and armv7 use `cross` (Docker-based cross-compilation).
name: cross-compile

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  # No RUSTFLAGS needed — musl targets default to +crt-static.
  # Profile settings (LTO + strip + panic=abort) come from Cargo.toml.

jobs:
  x86_64-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build (release, static)
        run: cargo build --target x86_64-unknown-linux-musl --release
      - name: Smoke test — verify static binary
        run: |
          file target/x86_64-unknown-linux-musl/release/kirkforge
          ldd target/x86_64-unknown-linux-musl/release/kirkforge 2>&1 \
            && echo "NOT STATIC" || echo "STATIC — no dynamic deps"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirkforge-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/kirkforge
          compression-level: 0  # binary is already stripped

  aarch64-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (release, static)
        run: cross build --target aarch64-unknown-linux-musl --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirkforge-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/kirkforge
          compression-level: 0

  armv7-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (release, static)
        run: cross build --target armv7-unknown-linux-musleabihf --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirkforge-armv7-musl
          path: target/armv7-unknown-linux-musleabihf/release/kirkforge
          compression-level: 0

  # Attach binaries to GitHub releases
  publish:
    if: github.event_name == 'release'
    needs: [x86_64-musl, aarch64-musl, armv7-musl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kirkforge-x86_64-musl
          path: release-artifacts/x86_64
      - uses: actions/download-artifact@v4
        with:
          name: kirkforge-aarch64-musl
          path: release-artifacts/aarch64
      - uses: actions/download-artifact@v4
        with:
          name: kirkforge-armv7-musl
          path: release-artifacts/armv7
      - name: Collate with target suffixes
        run: |
          mkdir -p release-bundle
          cp release-artifacts/x86_64/kirkforge release-bundle/kirkforge-x86_64-musl
          cp release-artifacts/aarch64/kirkforge release-bundle/kirkforge-aarch64-musl
          cp release-artifacts/armv7/kirkforge release-bundle/kirkforge-armv7-musl
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-bundle/*