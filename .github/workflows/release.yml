name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  # Do not build release artifacts unless the commit on main that this tag
  # points to has a green CI run. Tags are created by scripts/bump-version.sh
  # after main is already green, but this gate prevents accidental or rebased
  # tags from publishing from a broken commit.
  check-main-ci:
    name: Verify main CI is green
    runs-on: ubuntu-latest
    steps:
      - name: Check latest main CI conclusion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Tag ref: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          # Wait up to ~15 minutes for the CI run on this commit to complete.
          for i in {1..30}; do
            status=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
              --jq '.check_runs[] | select(.name == "CI" or (.name | startswith("CI /"))) | .conclusion' \
              2>/dev/null | sort -u | paste -sd ',' -)
            echo "Attempt $i: CI statuses = $status"
            if echo "$status" | grep -qE 'failure|cancelled|timed_out|action_required'; then
              echo "Main CI failed for this commit; refusing to release."
              exit 1
            fi
            if echo "$status" | grep -q 'success' && ! echo "$status" | grep -qE 'pending|neutral|skipped'; then
              echo "Main CI is green."
              exit 0
            fi
            sleep 30
          done
          echo "Timed out waiting for main CI to go green."
          exit 1

  build:
    name: Build release binaries
    needs: check-main-ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive_ext: zip
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set source date epoch
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: npm/kirkforge-plugin/package-lock.json

      - name: Build bundled Node SDK
        shell: bash
        run: |
          cd npm/kirkforge-plugin
          npm ci
          npm run build
          npm prune --production

      - name: Strip Node SDK dev artifacts
        shell: bash
        run: |
          cd npm/kirkforge-plugin
          # Workspace source/tests/source maps are not needed at runtime.
          find apps packages -type f \( -name "*.map" -o -name "*.test.ts" -o -name "*.test.js" -o -name "*.test.d.ts" \) -delete
          find apps packages -type d \( -name tests -o -name src \) -exec rm -rf {} +
          # Top-level repo files are not needed in the release bundle.
          find . -maxdepth 2 -type f \( \
            -name "README.md" -o -name "CHANGELOG.md" -o -name "eslint.config.js" -o -name "eslint.config.mjs" -o \
            -name "vitest.config.ts" -o -name "typedoc.json" -o -name "tsconfig.json" -o -name "tsconfig.package.json" -o \
            -name "tsconfig.tsbuildinfo" \
          \) -delete
          rm -rf e2e examples scripts
          # Strip documentation/type-only artifacts from third-party dependencies.
          find node_modules -type f \( -name "*.map" -o -name "*.d.ts" -o -name "README*" -o -name "CHANGELOG*" -o -name "LICENSE*" -o -name "*.md" \) -delete
          find node_modules -type d \( -name tests -o -name test -o -name __tests__ -o -name docs -o -name examples \) -exec rm -rf {} +

      - name: Package binaries, plugins, and Node SDK
        shell: bash
        run: |
          mkdir -p dist
          bins=(kirkforge kfd plugin3 stratum kirkforge-video)
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ext=".exe"
          else
            ext=""
          fi
          for bin in "${bins[@]}"; do
            cp "target/${{ matrix.target }}/release/${bin}${ext}" "dist/${bin}${ext}"
          done
          cp -R plugins dist/plugins
          mkdir -p dist/npm
          cp -R -P npm/kirkforge-plugin dist/npm/kirkforge-plugin
          archive="kirkforge-${{ matrix.target }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            powershell -Command "Compress-Archive -Path 'dist\kirkforge.exe','dist\kfd.exe','dist\plugin3.exe','dist\stratum.exe','dist\kirkforge-video.exe','dist\plugins','dist\npm' -DestinationPath 'dist\${archive}'"
          else
            tar -czf "dist/${archive}" -C dist $(for b in "${bins[@]}"; do echo "${b}${ext}"; done) plugins npm
          fi
          for bin in "${bins[@]}"; do
            rm "dist/${bin}${ext}"
          done
          rm -rf dist/plugins dist/npm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirkforge-${{ matrix.target }}
          path: dist/kirkforge-${{ matrix.target }}.*

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: kirkforge-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum kirkforge-* > SHA256SUMS.txt
          cd ..
          cat dist/SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        shell: bash
        continue-on-error: true
        run: |
          cd dist
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          if python3 scripts/extract-release-notes.py "${GITHUB_REF_NAME}" > release-notes.md; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (changelog notes)
        if: steps.notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md

      - name: Create release (generated notes)
        if: steps.notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
